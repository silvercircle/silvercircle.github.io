<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="google-site-verification" content="{{ site.site-verification}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/theme.css?v=13' | relative_url }}" media="screen" type="text/css">
    <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print" type="text/css">
    <script type="text/javascript" src="{{ site.baseurl}}/assets/js/jquery.js?v=14 }}"></script>
    <link rel="shortcut icon" type="image/png" href="/favicon.png?">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  {% seo %}
  </head>
  <body>
    <header>
      <div class="inner">
        <a href="{{ '/' | absolute_url }}">
          <h2 class="header">{{ site.title }}</h2>
        </a>
        <h2>{{ site.description }}</h2>
        <a href="https://github.com/silvercircle/silvercircle.github.io" class="button"><small>Follow me on</small> GitHub</a>
      </div>
    </header>
     <div class="menubar_wrapper">
      <div class="inner clearfix">
	     <div class="menubar">
         <div class="menu{% if page.menucontext == 'home' %} selected{% endif %}">
              <a href="{{site.baseurl}}/">Home</a>
	       </div>
           <div class="menu{% if page.menucontext == 'about' %} selected{% endif %}">
               <a href="{{site.baseurl}}/help/about.html">About</a>
           </div>
           <div class="menu{% if page.menucontext == 'blog' %} selected{% endif %}">
              <a href="{{site.baseurl}}/blog/index.html">Blog</a>
           </div>
           <div class="menu{% if page.menucontext == 'contact' %} selected{% endif %}">
              <a href="{{site.baseurl}}/help/contact.html">Contact</a>
           </div>
           <div class="menu{% if page.menucontext == 'topics' %} selected{% endif %}">
              <a href="{{site.baseurl}}/help/contact.html">Topics</a>
           </div>
	     </div>
      </div>
     </div>
