<h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
<div class="author" style="font-size:smaller; float:right;">
    Written by {{post.author}}{% if post.categories %}{% for cat in post.categories %}{% if forloop.first %}&nbsp;in&nbsp;{% endif %}<a href="{{site.baseurl}}/category/{{cat | strip | strip_html | downcase}}/index.html">{{cat | strip | strip_html}}</a>{% unless forloop.last %},&nbsp;{% endunless %}{% endfor %}{% endif %} | <time class="timeago" datetime="{{post.date}}">{{post.date}}</time>
</div>
<div class="clearfix"></div>
<hr class="separator">
<div class="content">
  {{ post.excerpt }}
</div>
<div style="float:right;">
  <a href="{{site.baseurl}}{{post.url}}">Read more...</a>
</div>
<div class="clear"></div>
<br>
<br>
