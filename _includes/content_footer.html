<div style="margin-top: 0.5em">
{% if page.tags contains 'first' %}
<div style="float:right;">
    Words: {{page.content | number_of_words}}
</div>
{% endif %}
{% for tag in page.tags %}
    {% if tag == 'first' %}
        {% continue %}
    {% endif %}
    <a class="tag" href="{{site.baseurl}}/tags/{{tag | downcase }}">{{tag}}</a>
{% endfor %}
<div class="clear"></div>
</div>
